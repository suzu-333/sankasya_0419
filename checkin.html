<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{

  --brown:#2c1a0e;--brown2:#4a2e18;--brown3:#7a5438;--brown4:#a87850;
  --gold:#b8922a;--gold2:#d4aa48;--gold-line:#c8a83a;--gold-pale:#f5ead0;
  --green:#2a5e3a;--green-bg:#e8f5ed;--green-dark:#1e4a2a;
  --red:#7a2020;--red-bg:#faeaea;
  --border:#d4b878;--border-lt:#e8d4a0;
}
html,body{min-height:100vh;background:var(--ivory);font-family:"Noto Serif JP",serif;color:var(--brown);overflow-x:hidden}
body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 60% 40% at 15% 20%,rgba(200,168,58,0.06),transparent 70%),radial-gradient(ellipse 50% 60% at 85% 80%,rgba(200,168,58,0.05),transparent 70%)}
.page{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 16px 60px}
.brand{text-align:center;margin-bottom:30px;width:100%;max-width:420px}
.brand-eyebrow{font-family:"Cormorant Garamond",serif;font-style:italic;font-size:11px;letter-spacing:.3em;color:var(--gold2);text-transform:uppercase;margin-bottom:12px;display:block}
.brand-emblem{width:68px;height:68px;border-radius:50%;border:1px solid var(--border);background:var(--ivory2);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;position:relative}
.brand-emblem::before{content:"";position:absolute;inset:-6px;border-radius:50%;border:.5px solid var(--border-lt)}
.brand-monogram{font-family:"Cormorant Garamond",serif;font-size:20px;font-weight:600;color:var(--gold);letter-spacing:.05em}
.brand-name{font-family:"Cormorant Garamond",serif;font-size:30px;font-weight:300;letter-spacing:.22em;color:var(--brown);text-transform:uppercase;line-height:1;display:block}
.brand-name em{font-style:normal;font-weight:500;color:var(--brown2)}
.brand-rule{display:flex;align-items:center;justify-content:center;gap:8px;margin:10px 0}
.brand-rule-line{flex:1;max-width:60px;height:.5px;background:var(--gold-line)}
.brand-rule-diamond{width:5px;height:5px;background:var(--gold);transform:rotate(45deg);flex-shrink:0}
.brand-serif{font-family:"Cormorant Garamond",serif;font-style:italic;font-size:15px;font-weight:300;color:var(--brown3);letter-spacing:.1em}
.brand-event{font-size:10px;letter-spacing:.18em;color:var(--brown4);text-transform:uppercase;margin-top:8px}
.card{width:100%;max-width:420px;background:white;border:1px solid var(--border-lt);border-radius:2px;overflow:hidden;box-shadow:0 2px 40px rgba(44,26,14,.08),0 0 0 4px var(--ivory)}
.card-strip{height:4px;background:linear-gradient(90deg,var(--brown2),var(--gold),var(--gold2),var(--gold),var(--brown2))}
.scr{padding:28px 24px 24px;display:none}
.scr.on{display:block}
#s-load{text-align:center;padding:40px 0}
.spin{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--border-lt);border-top-color:var(--gold);animation:spin .8s linear infinite;margin:0 auto 14px}

.load-txt{font-size:12px;color:var(--brown4);letter-spacing:.1em}
.s-eyebrow{font-family:"Cormorant Garamond",serif;font-style:italic;font-size:12px;color:var(--gold);letter-spacing:.14em;text-align:center;display:block;margin-bottom:6px}
.s-title{font-family:"Cormorant Garamond",serif;font-size:21px;font-weight:400;color:var(--brown);text-align:center;letter-spacing:.06em;margin-bottom:4px;line-height:1.3}
.s-sub{font-size:12px;color:var(--brown3);text-align:center;margin-bottom:20px;line-height:1.8;letter-spacing:.04em}
.search-wrap{position:relative;margin-bottom:10px}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--gold2);font-size:12px;font-family:"Cormorant Garamond",serif;pointer-events:none}
#name-input{width:100%;padding:13px 14px 13px 34px;border:1px solid var(--border);border-radius:1px;font-size:16px;font-family:"Noto Serif JP",serif;color:var(--brown);background:var(--ivory2);outline:none;transition:border-color .2s,background .2s;letter-spacing:.02em}
#name-input:focus{border-color:var(--gold);background:white}
#name-input::placeholder{color:var(--brown4);font-style:italic;font-size:13px}
.results-wrap{border:1px solid var(--border-lt);border-radius:1px;overflow:hidden}
.result-row{display:flex;align-items:center;gap:12px;padding:13px 16px;cursor:pointer;border-bottom:.5px solid var(--border-lt);background:white;transition:background .12s;-webkit-tap-highlight-color:transparent}
.result-row:last-child{border-bottom:none}
.result-row:active{background:var(--ivory2)}
.result-avatar{width:38px;height:38px;border-radius:50%;background:var(--ivory3);border:1px solid var(--border-lt);display:flex;align-items:center;justify-content:center;font-family:"Cormorant Garamond",serif;font-size:14px;font-weight:500;color:var(--brown2);flex-shrink:0}
.result-info{flex:1;min-width:0}
.result-name{font-size:15px;font-weight:500;color:var(--brown);letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.result-furi{font-size:11px;color:var(--brown4);margin-top:2px;letter-spacing:.06em}
.result-arrow{color:var(--gold);font-family:"Cormorant Garamond",serif;font-size:18px;flex-shrink:0}
.no-results{text-align:center;padding:22px 16px;font-size:12px;color:var(--brown4);letter-spacing:.06em;line-height:1.8;font-style:italic}
.back-btn{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--brown4);cursor:pointer;background:none;border:none;font-family:"Noto Serif JP",serif;letter-spacing:.06em;margin-bottom:18px;padding:0}
.confirm-eyebrow{font-family:"Cormorant Garamond",serif;font-style:italic;font-size:11px;color:var(--gold);letter-spacing:.18em;text-transform:uppercase;display:block;text-align:center;margin-bottom:8px}
.confirm-name{font-family:"Cormorant Garamond",serif;font-size:26px;font-weight:400;color:var(--brown);text-align:center;letter-spacing:.06em;line-height:1.2}
.confirm-furi{font-size:11px;color:var(--brown3);text-align:center;margin-top:4px;letter-spacing:.1em}
.divider{display:flex;align-items:center;gap:8px;margin:16px 0}
.divider span{flex:1;height:.5px;background:var(--border-lt)}
.divider i{font-style:normal;color:var(--gold);font-size:11px;font-family:"Cormorant Garamond",serif}
.gift-box{background:linear-gradient(135deg,#fdf4e0,#fdf8f2);border:1px solid var(--border-lt);border-radius:1px;padding:13px 16px;display:flex;align-items:center;gap:13px;margin-bottom:12px}
.gift-mark{width:34px;height:34px;border:1px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:"Cormorant Garamond",serif;font-size:16px;color:var(--gold);flex-shrink:0;background:white}
.gift-label{font-size:9px;color:var(--brown4);letter-spacing:.12em;text-transform:uppercase;margin-bottom:3px}
.gift-name{font-family:"Cormorant Garamond",serif;font-size:16px;font-weight:500;color:var(--brown2);letter-spacing:.04em}
.allergy-box{background:var(--red-bg);border:1px solid rgba(122,32,32,.2);border-radius:1px;padding:12px 16px;display:flex;gap:11px;margin-bottom:12px}
.allergy-mark{width:22px;height:22px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;color:white;font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px}
.allergy-label{font-size:9px;color:var(--red);letter-spacing:.1em;text-transform:uppercase;margin-bottom:2px}

.info-rows{margin-bottom:4px}

.success-msg{font-size:12px;color:var(--brown3);line-height:2;letter-spacing:.06em}

.footer{margin-top:auto;padding-top:30px;text-align:center}

</style>
</head>

function gmark(g){if(!g)return"◆";if(g.includes("クリーム"))return"✦";if(g.includes("ローション"))return"◈";if(g.includes("ソープ"))return"◇";if(g.includes("シャンプー")||g.includes("エッセンス"))return"◉";if(g.includes("全セット"))return"❖";return"◆"}
function show(id){["load","search","confirm","already","success"].forEach(s=>{const e=document.getElementById("s-"+s);if(e)e.classList.toggle("on",s===id)})}
function giftHTML(gift,mode){
  if(!gift||gift==="ギフト不要")return"";
  if(mode==="success")return`<div class="success-gift"><div class="sg-label">本日のギフト</div><span class="sg-mark">${gmark(gift)}</span><div class="sg-name">${gift}</div></div>`;
  return`<div class="gift-box"><div class="gift-mark">${gmark(gift)}</div><div><div class="gift-label">本日のギフト</div><div class="gift-name">${gift}</div></div></div>`;
}
function irow(k,v){return`<div class="info-row"><span class="info-k">${k}</span><span class="info-v">${v}</span></div>`}
let db=null,dbRef=null,checkinData={},selectedGuest=null;
async function init(){
  try{
    const app=initializeApp(FIREBASE_CONFIG);
    db=getDatabase(app);dbRef=ref(db,"checkin");
    const snap=await get(dbRef);checkinData=snap.val()||{};
    onValue(dbRef,s=>{checkinData=s.val()||{}});
  }catch(e){try{checkinData=JSON.parse(localStorage.getItem("ilbrille_v4")||"{}")}catch{}}
  setTimeout(()=>show("search"),400);
}
function toKata(s){return s.replace(/[\u3041-\u3096]/g,c=>String.fromCharCode(c.charCodeAt(0)+0x60))}
document.getElementById("name-input").addEventListener("input",function(){
  const q=this.value.trim(),cont=document.getElementById("results-container");
  if(!q){cont.innerHTML="";return}
  const qn=toKata(q).toLowerCase(),ql=q.toLowerCase();
  const hits=GUESTS.filter(g=>g.name.toLowerCase().includes(ql)||toKata(g.furigana).toLowerCase().includes(qn)||g.furigana.toLowerCase().includes(ql)).slice(0,8);
  if(!hits.length){cont.innerHTML=`<div class="no-results">見つかりませんでした。<br>スタッフへお声がけください。</div>`;return}
  cont.innerHTML="<div class=\"results-wrap\">"+hits.map(g=>{
    const ini=(g.furigana||g.name).replace(/\s/g,"").substring(0,2);
    return`<div class="result-row" onclick="selectGuest(${g.id})"><div class="result-avatar">${ini}</div><div class="result-info"><div class="result-name">${g.name} 様</div><div class="result-furi">${g.furigana}</div></div><span class="result-arrow">›</span></div>`;
  }).join("")+"</div>";
});
window.selectGuest=function(id){
  const g=GUESTS.find(x=>x.id===id);if(!g)return;selectedGuest=g;
  if(checkinData[id]){document.getElementById("already-gift").innerHTML=giftHTML(g.gift);show("already");return}
  document.getElementById("c-name").textContent=g.name+" 様";
  document.getElementById("c-furi").textContent=g.furigana;
  document.getElementById("c-allergy").innerHTML=g.hasAllergy?`<div class="allergy-box"><div class="allergy-mark">!</div><div><div class="allergy-label">食物アレルギー</div><div class="allergy-detail">${g.allergyDetail||"詳細不明"}</div></div></div>`:"";
  document.getElementById("c-gift").innerHTML=giftHTML(g.gift);
  let rows="";if(g.arrival)rows+=irow("来場予定時刻",g.arrival);
  document.getElementById("c-rows").innerHTML=rows;show("confirm");
};
window.goBack=()=>show("search");
window.goSearch=()=>{document.getElementById("name-input").value="";document.getElementById("results-container").innerHTML="";show("search")};
document.getElementById("btn-do").addEventListener("click",async()=>{
  if(!selectedGuest)return;
  const ts=Date.now();
  checkinData[selectedGuest.id]=ts;
  try{
    if(db&&dbRef)await update(dbRef,{[selectedGuest.id]:ts});
    else saveLocal();
  }catch(e){saveLocal()}
  document.getElementById("s-name").textContent=selectedGuest.name+" 様";
  document.getElementById("s-gift").innerHTML=giftHTML(selectedGuest.gift,"success");
  show("success");
});
function saveLocal(){const s={};Object.keys(checkinData).forEach(k=>{if(checkinData[k])s[k]=checkinData[k]});localStorage.setItem("ilbrille_v4",JSON.stringify(s))}
init();
</script>
