<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>受付管理 — iL BRiLLE</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Noto+Serif+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --ivory:#fdf8f2;--ivory2:#f7efe3;--ivory3:#efe3d3;--ivory4:#e6d5c0;
  --brown:#2c1a0e;--brown2:#4a2e18;--brown3:#7a5438;--brown4:#a87850;
  --gold:#b8922a;--gold2:#d4aa48;--gold-line:#c8a83a;--gold-pale:#f5ead0;
  --green:#2a5e3a;--green-bg:#e8f5ed;--green-dark:#1e4a2a;
  --red:#7a2020;--red-bg:#faeaea;--red-mid:#a03030;
  --amber:#7a5010;--amber-bg:#f5e8c8;
  --border:#d4b878;--border-lt:#e8d4a0;--border-vlt:#f0e4c0;
}
html,body{min-height:100vh;background:var(--ivory);font-family:"Noto Serif JP",serif;color:var(--brown)}
body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 60% 40% at 15% 10%,rgba(200,168,58,0.05),transparent 70%),radial-gradient(ellipse 40% 50% at 85% 90%,rgba(200,168,58,0.04),transparent 70%)}
#app{position:relative;z-index:1;max-width:640px;margin:0 auto;min-height:100vh;background:var(--ivory);border-left:.5px solid var(--border-lt);border-right:.5px solid var(--border-lt)}
.header{background:linear-gradient(180deg,#f5e8d0,var(--ivory));border-bottom:1px solid var(--border);padding:14px 16px 12px;position:sticky;top:0;z-index:20}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
.brand-mark{font-family:"Cormorant Garamond",serif;font-style:italic;font-size:11px;letter-spacing:.22em;color:var(--gold2);text-transform:uppercase}
.live-wrap{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--brown4);letter-spacing:.04em}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(42,94,58,.3)}50%{opacity:.5;box-shadow:0 0 0 4px rgba(42,94,58,0)}}
.header-stripe{height:2px;background:linear-gradient(90deg,var(--ivory),var(--border),var(--gold),var(--gold2),var(--gold),var(--border),var(--ivory));margin:6px 0}
.header-title{font-family:"Cormorant Garamond",serif;font-size:17px;font-weight:300;color:var(--brown2);letter-spacing:.1em;margin-bottom:12px;font-style:italic}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.stat{background:white;border:.5px solid var(--border-lt);border-radius:1px;padding:8px 4px;text-align:center;box-shadow:0 1px 6px rgba(44,26,14,.05)}
.stat .num{font-family:"Cormorant Garamond",serif;font-size:24px;font-weight:500;color:var(--brown);line-height:1}
.stat .lbl{font-size:9px;color:var(--brown4);margin-top:2px;letter-spacing:.08em;text-transform:uppercase}
.stat.s-in .num{color:var(--green-dark)}.stat.s-out .num{color:var(--gold)}.stat.s-unpaid .num{color:var(--red)}
.search-wrap{padding:10px 14px;background:var(--ivory);border-bottom:.5px solid var(--border-lt);position:sticky;top:134px;z-index:19}
.search-inner{position:relative}
.si{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--gold2);font-size:12px;pointer-events:none;font-family:"Cormorant Garamond",serif}
#search{width:100%;padding:9px 12px 9px 32px;border:.5px solid var(--border);border-radius:1px;font-size:13px;font-family:"Noto Serif JP",serif;background:var(--ivory2);color:var(--brown);outline:none;transition:border-color .2s,background .2s;letter-spacing:.02em}
#search:focus{border-color:var(--gold);background:white}
#search::placeholder{color:var(--brown4);font-style:italic;font-size:12px}
.filter-row{display:flex;gap:5px;padding:8px 14px;overflow-x:auto;background:var(--ivory);border-bottom:.5px solid var(--border-lt);position:sticky;top:181px;z-index:18}
.filter-row::-webkit-scrollbar{display:none}
.filter-btn{padding:4px 12px;border-radius:0;border:.5px solid var(--border);background:white;font-size:10px;color:var(--brown3);cursor:pointer;white-space:nowrap;flex-shrink:0;font-family:"Noto Serif JP",serif;transition:all .15s;letter-spacing:.04em}
.filter-btn.active{background:var(--brown2);color:white;border-color:var(--brown2)}
.section-label{padding:5px 16px;font-size:9px;color:var(--brown4);background:var(--ivory3);border-bottom:.5px solid var(--border-lt);letter-spacing:.16em;text-transform:uppercase;font-family:"Cormorant Garamond",serif;font-style:italic;display:flex;align-items:center;gap:8px}
.section-label::before,.section-label::after{content:"";flex:1;height:.5px;background:var(--border-vlt)}
.guest-item{display:flex;align-items:center;padding:11px 14px;border-bottom:.5px solid var(--border-vlt);gap:11px;cursor:pointer;background:white;transition:background .1s;position:relative}
.guest-item::before{content:"";position:absolute;left:0;top:0;bottom:0;width:2px;background:transparent;transition:background .15s}
.guest-item:hover{background:var(--ivory2)}.guest-item:hover::before{background:var(--gold2)}
.guest-item.checked{background:linear-gradient(90deg,#edf6f1,white)}.guest-item.checked::before{background:var(--green)}
.avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:"Cormorant Garamond",serif;font-size:14px;font-weight:500;flex-shrink:0;border:1px solid transparent;letter-spacing:-.02em}
.av-in{background:var(--green-bg);color:var(--green-dark);border-color:rgba(42,94,58,.22)}
.av-out{background:var(--ivory3);color:var(--brown3);border-color:var(--border-lt)}
.av-unpaid{background:var(--amber-bg);color:var(--amber);border-color:rgba(122,80,16,.2)}
.guest-info{flex:1;min-width:0}
.guest-name-row{display:flex;align-items:baseline;gap:8px;min-width:0}
.guest-name{font-size:14px;font-weight:500;color:var(--brown);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.02em}
.checkin-time{font-size:10px;color:var(--green-dark);letter-spacing:.04em;flex-shrink:0;font-family:"Cormorant Garamond",serif;font-style:italic;white-space:nowrap}
.guest-furi{font-size:10px;color:var(--brown4);margin-top:1px;letter-spacing:.06em}
.guest-allergy-row{display:flex;align-items:flex-start;gap:5px;margin-top:3px;font-size:11px;color:var(--red);letter-spacing:.02em;line-height:1.4}
.allergy-inline-mark{width:14px;height:14px;border-radius:50%;background:var(--red);color:white;font-size:9px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.guest-meta{display:flex;align-items:center;gap:6px;margin-top:3px;flex-wrap:wrap}
.guest-gift{font-size:10px;color:var(--gold);display:flex;align-items:center;gap:3px;font-family:"Cormorant Garamond",serif}
.guest-gift.delivered{color:var(--green);font-weight:500}
.gem{width:4px;height:4px;background:var(--gold2);transform:rotate(45deg);flex-shrink:0}
.guest-gift.delivered .gem{background:var(--green)}
.badges{display:flex;gap:3px}
.badge{font-size:9px;padding:1px 6px;border-radius:0;font-weight:400;letter-spacing:.04em}
.badge.child{background:#e8eef8;color:#2a4a7a;border:.5px solid rgba(42,74,122,.18)}
.badge.unpaid{background:var(--amber-bg);color:var(--amber);border:.5px solid rgba(122,80,16,.18)}
.check-btn{width:34px;height:34px;border-radius:50%;border:1px solid var(--border);background:white;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;font-size:14px;color:var(--brown4);transition:all .15s;-webkit-tap-highlight-color:transparent}
.check-btn:hover{border-color:var(--gold);color:var(--gold)}
.check-btn.done{background:var(--green-bg);border-color:rgba(42,94,58,.3);color:var(--green-dark);font-family:"Cormorant Garamond",serif}
.check-btn:active{transform:scale(.9)}
.btn-col{display:flex;flex-direction:column;align-items:center;gap:5px;flex-shrink:0}
.uncheck-btn{
  padding:3px 8px;border-radius:0;
  border:1px solid var(--red);
  background:var(--red-bg);
  color:var(--red);
  font-size:10px;font-family:"Noto Serif JP",serif;
  cursor:pointer;white-space:nowrap;letter-spacing:.04em;
  -webkit-tap-highlight-color:transparent;
  transition:background .12s;
}
.uncheck-btn:active{background:#f5d0d0}
.empty{text-align:center;padding:60px 20px;color:var(--brown4);font-size:12px;letter-spacing:.1em;font-style:italic}
.empty-mark{font-family:"Cormorant Garamond",serif;font-size:30px;color:var(--border);margin-bottom:10px;display:block}
.modal-overlay{position:fixed;inset:0;background:rgba(44,26,14,.45);backdrop-filter:blur(2px);display:flex;align-items:flex-end;z-index:100;animation:fadeIn .15s ease}
.modal-overlay.hiding{animation:fadeOut .15s ease forwards}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeOut{from{opacity:1}to{opacity:0}}
.modal{background:var(--ivory);border-radius:0;border-top:1px solid var(--border);padding:0 0 44px;width:100%;max-width:640px;margin:0 auto;max-height:88vh;overflow-y:auto;animation:slideUp .2s cubic-bezier(.34,1.1,.64,1)}
.modal-overlay.hiding .modal{animation:slideDown .15s ease forwards}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes slideDown{from{transform:translateY(0)}to{transform:translateY(40px);opacity:0}}
.modal-handle{width:32px;height:3px;border-radius:0;background:var(--border);margin:10px auto 0}
.modal-stripe{height:3px;background:linear-gradient(90deg,var(--ivory),var(--border),var(--gold),var(--gold2),var(--gold),var(--border),var(--ivory));margin:10px 0 0}
.modal-header{padding:14px 22px 12px;border-bottom:.5px solid var(--border-lt)}
.modal-header h2{font-family:"Cormorant Garamond",serif;font-size:23px;font-weight:400;color:var(--brown);letter-spacing:.06em}
.modal-header p{font-size:11px;color:var(--brown4);margin-top:3px;letter-spacing:.08em}
.modal-status{display:inline-flex;align-items:center;gap:5px;padding:2px 9px;border-radius:0;font-size:9px;margin-top:6px;letter-spacing:.1em;text-transform:uppercase;font-family:"Cormorant Garamond",serif;font-style:italic}
.modal-status.checked{background:var(--green-bg);color:var(--green-dark);border:.5px solid rgba(42,94,58,.2)}
.modal-status.nc{background:var(--gold-pale);color:var(--brown2);border:.5px solid var(--border-lt)}
.m-gift{margin:14px 22px 0;background:linear-gradient(135deg,#fdf4e0,#fdf8f2);border:.5px solid var(--border-lt);border-radius:1px;padding:12px 16px;display:flex;align-items:center;gap:13px;position:relative}
.m-gift.delivered{background:linear-gradient(135deg,var(--green-bg),white);border-color:rgba(42,94,58,.3)}
.m-gift .gi{font-family:"Cormorant Garamond",serif;font-size:21px;color:var(--gold);width:28px;text-align:center;flex-shrink:0}
.m-gift.delivered .gi{color:var(--green)}
.m-gift .gl{font-size:9px;color:var(--brown4);letter-spacing:.12em;text-transform:uppercase;margin-bottom:3px}
.m-gift .gn{font-family:"Cormorant Garamond",serif;font-size:16px;font-weight:500;color:var(--brown2);letter-spacing:.04em}
.m-allergy{margin:10px 22px 0;background:var(--red-bg);border:.5px solid rgba(122,32,32,.2);border-radius:1px;padding:12px 16px;display:flex;gap:11px}
.m-allergy .ai{width:20px;height:20px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;color:white;font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px}
.m-allergy .al{font-size:9px;color:var(--red);letter-spacing:.1em;text-transform:uppercase;margin-bottom:2px}
.m-allergy .ad{font-size:13px;color:var(--red);font-weight:500;line-height:1.6;letter-spacing:.02em}
.modal-sep{height:.5px;background:linear-gradient(90deg,transparent,var(--border-lt),transparent);margin:4px 22px}
.modal-body{padding:0 22px}
.modal-row{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 0;border-bottom:.5px solid var(--border-vlt);font-size:12px;gap:12px}
.modal-row:last-child{border-bottom:none}
.modal-row .key{color:var(--brown4);flex-shrink:0;font-size:11px;letter-spacing:.06em}
.modal-row .val{color:var(--brown);text-align:right;word-break:break-all;line-height:1.6}
.val.ok{color:var(--green-dark)}.val.ng{color:var(--amber)}
.modal-actions{padding:18px 22px 0;display:flex;flex-direction:column;gap:8px}
.btn-gold{width:100%;padding:14px;border-radius:0;border:none;font-size:13px;font-weight:400;font-family:"Cormorant Garamond",serif;background:var(--brown2);color:white;cursor:pointer;letter-spacing:.18em;text-transform:uppercase;transition:background .15s}
.btn-gold:active{background:var(--brown)}
.btn-gold.undo{background:white;color:var(--brown3);border:.5px solid var(--border-lt);font-size:12px;letter-spacing:.06em;text-transform:none;font-family:"Noto Serif JP",serif}
.btn-gift{background:var(--gold);margin-bottom:4px}
.btn-gift.undo{background:var(--ivory3);color:var(--brown3);border:none}
.btn-close{width:100%;padding:11px;border-radius:0;border:.5px solid var(--border-lt);background:transparent;color:var(--brown4);font-size:11px;font-family:"Noto Serif JP",serif;cursor:pointer;letter-spacing:.06em}
.qr-fab{position:fixed;bottom:24px;right:calc(50% - 304px);width:50px;height:50px;border-radius:50%;background:var(--brown2);color:var(--gold2);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;font-family:"Cormorant Garamond",serif;z-index:50;box-shadow:0 4px 20px rgba(44,26,14,.2);transition:transform .15s}
.qr-fab:active{transform:scale(.93)}
@media(max-width:640px){.qr-fab{right:16px}}
.qr-panel{position:fixed;inset:0;background:rgba(44,26,14,.5);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
.qr-box{background:var(--ivory);border:.5px solid var(--border);border-radius:2px;padding:24px 20px;max-width:400px;width:100%;box-shadow:0 20px 60px rgba(44,26,14,.2)}
.qr-box h2{font-family:"Cormorant Garamond",serif;font-size:19px;font-weight:400;color:var(--brown);margin-bottom:4px;letter-spacing:.08em;font-style:italic}
.qr-box p{font-size:11px;color:var(--brown3);margin-bottom:14px;line-height:1.8}
.qr-url-box{background:white;border:.5px solid var(--border-lt);border-radius:1px;padding:14px 16px;margin-bottom:12px}
.qr-url-label{font-size:9px;color:var(--brown4);letter-spacing:.14em;text-transform:uppercase;margin-bottom:6px;font-family:"Cormorant Garamond",serif;font-style:italic}
.qr-url-text{font-size:11px;color:var(--brown2);word-break:break-all;line-height:1.7;margin-bottom:12px}
.qr-url-copy{width:100%;padding:11px;border-radius:0;background:var(--brown2);color:white;border:none;font-size:12px;font-family:"Cormorant Garamond",serif;cursor:pointer;letter-spacing:.16em;text-transform:uppercase}
.qr-note{font-size:10px;color:var(--brown4);line-height:1.8;margin-bottom:12px}
.qr-note a{color:var(--gold);text-decoration:underline}
.qr-close{width:100%;padding:10px;border-radius:0;border:.5px solid var(--border-lt);background:transparent;color:var(--brown4);font-size:11px;font-family:"Noto Serif JP",serif;cursor:pointer}
.toast{position:fixed;bottom:86px;left:50%;transform:translateX(-50%);background:var(--brown);color:var(--gold-pale);padding:9px 18px;border-radius:0;font-size:11px;z-index:300;pointer-events:none;opacity:0;transition:opacity .2s;white-space:nowrap;font-family:"Cormorant Garamond",serif;letter-spacing:.1em;box-shadow:0 4px 16px rgba(44,26,14,.25)}
.toast.show{opacity:1}
.splash{position:fixed;inset:0;background:var(--ivory);display:flex;align-items:center;justify-content:center;flex-direction:column;z-index:500;transition:opacity .4s}
.splash.hide{opacity:0;pointer-events:none}
.splash-emblem{width:56px;height:56px;border-radius:50%;border:1px solid var(--border);background:var(--ivory2);display:flex;align-items:center;justify-content:center;margin-bottom:10px}
.splash-monogram{font-family:"Cormorant Garamond",serif;font-size:18px;font-weight:600;color:var(--gold)}
.splash-name{font-family:"Cormorant Garamond",serif;font-style:italic;font-size:20px;color:var(--brown2);margin-bottom:3px;letter-spacing:.12em}
.splash-sub{font-size:10px;color:var(--brown4);letter-spacing:.16em;text-transform:uppercase;margin-bottom:18px}
.splash-spin{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border-lt);border-top-color:var(--gold);animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="splash" id="splash">
  <div class="splash-emblem"><div class="splash-monogram">iB</div></div>
  <div class="splash-name">iL BRiLLE</div>
  <div class="splash-sub">Reception</div>
  <div class="splash-spin"></div>
</div>
<div id="app">
  <div class="header">
    <div class="header-top">
      <span class="brand-mark">iL BRiLLE — Staff Reception</span>
      <div class="live-wrap"><div class="live-dot"></div><span id="live-label">接続中…</span></div>
    </div>
    <div class="header-stripe"></div>
    <div class="header-title">新商品発表パーティー 受付管理</div>
    <div class="stats">
      <div class="stat"><div class="num" id="s-total">—</div><div class="lbl">総数</div></div>
      <div class="stat s-in"><div class="num" id="s-in">0</div><div class="lbl">来場済み</div></div>
      <div class="stat s-out"><div class="num" id="s-out">—</div><div class="lbl">未来場</div></div>
      <div class="stat s-unpaid"><div class="num" id="s-unpaid">—</div><div class="lbl">入金未確認</div></div>
    </div>
  </div>
  <div class="search-wrap">
    <div class="search-inner">
      <span class="si">✦</span>
      <input id="search" type="search" placeholder="名前・フリガナで検索…" autocomplete="off">
    </div>
  </div>
  <div class="filter-row">
    <button class="filter-btn active" data-filter="all">すべて</button>
    <button class="filter-btn" data-filter="out">未来場</button>
    <button class="filter-btn" data-filter="in">来場済み</button>
    <button class="filter-btn" data-filter="gift-done">ギフト配布済</button>
    <button class="filter-btn" data-filter="gift-yet">ギフト未配布</button>
    <button class="filter-btn" data-filter="unpaid">入金未確認</button>
    <button class="filter-btn" data-filter="allergy">アレルギー</button>
  </div>
  <div id="guest-list"></div>
</div>
<button class="qr-fab" onclick="openQrPanel()">QR</button>
<div id="modal-overlay" class="modal-overlay" style="display:none" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-handle"></div><div class="modal-stripe"></div>
    <div class="modal-header"><h2 id="m-name"></h2><p id="m-furigana"></p><div id="m-status" class="modal-status"></div></div>
    <div id="m-gift"></div><div id="m-allergy"></div>
    <div class="modal-sep" style="margin-top:14px"></div>
    <div class="modal-body" id="m-rows"></div>
    <div class="modal-actions">
      <button id="m-gift-btn" class="btn-gold btn-gift" style="display:none"></button>
      <button id="m-btn" class="btn-gold"></button>
      <button class="btn-close" onclick="closeModal()">閉じる</button>
    </div>
  </div>
</div>
<div id="qr-panel" class="qr-panel" style="display:none">
  <div class="qr-box">
    <h2>セルフチェックイン QR</h2>
    <p>以下のURLをQRコード化して受付に掲示してください。<br>お客様全員が同じQRを読み込みます。</p>
    <div class="qr-url-box">
      <div class="qr-url-label">チェックインページ URL</div>
      <div class="qr-url-text" id="qr-url-text">—</div>
      <button class="qr-url-copy" onclick="copyUrl()">URLをコピー</button>
    </div>
    <div class="qr-note"><a href="https://www.qr-code-generator.com" target="_blank">qr-code-generator.com</a> にURLを貼り付けるとQRコードが作れます。</div>
    <button class="qr-close" onclick="document.getElementById('qr-panel').style.display='none'">閉じる</button>
  </div>
</div>
<div class="toast" id="toast"></div>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import{getDatabase,ref,get,set,remove}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
const FIREBASE_CONFIG={
  apiKey: "AIzaSyDo1EE1CZ0bB4p3EFhIs5L1z2aJzeucyik",
  authDomain: "ilbrille-party.firebaseapp.com",
  databaseURL: "https://ilbrille-party-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "ilbrille-party",
  storageBucket: "ilbrille-party.firebasestorage.app",
  messagingSenderId: "463110116614",

let guests=[],filter="all",selectedId=null,toastTimer=null,db=null,dbRef=null,giftRef=null;

try{
  const app=initializeApp(FIREBASE_CONFIG);
  db=getDatabase(app);
  dbRef=ref(db,"checkin");
  giftRef=ref(db,"gift");
}catch(e){db=null;dbRef=null;giftRef=null;}

async function fetchData(targetRef){
  if(!db||!targetRef)return{};
  try{
    const snap=await get(targetRef);
    return snap.val()||{};
  }catch(e){return{}}
}

async function init(){
  const checkinData=await fetchData(dbRef);
  const giftData=await fetchData(giftRef);
  
  guests=GUESTS.map(g=>{
    const v=checkinData[g.id];
    const gv=giftData[g.id];
    return{
      ...g,
      checkedIn:!!v,
      checkedAt:typeof v==="number"?v:0,
      giftDelivered:!!gv
    };
  });
  document.getElementById("live-label").textContent=db?"リアルタイム同期中":"ローカルモード";
  hideSplash();
  render();
  
  if(db){
    setInterval(async()=>{
      try{
        const cSnap=await get(dbRef);
        const gSnap=await get(giftRef);
        const cData=cSnap.val()||{};
        const gData=gSnap.val()||{};
        let changed=false;
        guests.forEach(g=>{
          const cv=cData[g.id];
          const gv=!!gData[g.id];
          const rc=!!cv;
          const ra=typeof cv==="number"?cv:0;
          if(rc!==g.checkedIn||gv!==g.giftDelivered){
            g.checkedIn=rc;g.checkedAt=ra;g.giftDelivered=gv;
            changed=true;
          }
        });
        if(changed)render();
      }catch(e){}
    },5000);
  }
}

function hideSplash(){const s=document.getElementById("splash");s.classList.add("hide");setTimeout(()=>s.style.display="none",400)}

async function setCheckin(id,val){
  const g=guests.find(x=>x.id===id);
  if(!g)return;
  g.checkedIn=val;
  g.checkedAt=val?Date.now():0;
  render();
  if(db&&dbRef){
    try{
      const itemRef=ref(db,"checkin/"+id);
      if(val) await set(itemRef,g.checkedAt);
      else await remove(itemRef);
    }catch(e){}
  }
}

async function setGiftStatus(id,val){
  const g=guests.find(x=>x.id===id);
  if(!g)return;
  g.giftDelivered=val;
  render();
  if(db&&giftRef){
    try{
      const itemRef=ref(db,"gift/"+id);
      if(val) await set(itemRef,true);
      else await remove(itemRef);
    }catch(e){}
  }
}

function updateStats(){
  const ci=guests.filter(g=>g.checkedIn).length,up=guests.filter(g=>!g.paid).length;
  document.getElementById("s-total").textContent=guests.length;
  document.getElementById("s-in").textContent=ci;
  document.getElementById("s-out").textContent=guests.length-ci;
  document.getElementById("s-unpaid").textContent=up;
}
function render(){
  const q=document.getElementById("search").value.trim().toLowerCase();
  let list=guests;
  if(q)list=list.filter(g=>g.name.toLowerCase().includes(q)||g.furigana.toLowerCase().includes(q));
  if(filter==="in")list=list.filter(g=>g.checkedIn);
  if(filter==="out")list=list.filter(g=>!g.checkedIn);
  if(filter==="unpaid")list=list.filter(g=>!g.paid);
  if(filter==="allergy")list=list.filter(g=>g.hasAllergy);
  if(filter==="gift-done")list=list.filter(g=>g.giftDelivered);
  if(filter==="gift-yet")list=list.filter(g=>!g.giftDelivered && g.gift && g.gift!=="ギフト不要");
  
  updateStats();
  const cont=document.getElementById("guest-list");
  if(!list.length){cont.innerHTML=`<div class="empty"><span class="empty-mark">✦</span>該当するお客様が見つかりません</div>`;return}
  const out=[...list.filter(g=>!g.checkedIn)];
  const inn=[...list.filter(g=>g.checkedIn)].sort((a,b)=>(b.checkedAt||0)-(a.checkedAt||0));
  let h="";
  if(out.length){h+=`<div class="section-label">未来場 — ${out.length}名</div>`;out.forEach(g=>{h+=gRow(g)})}
  if(inn.length){h+=`<div class="section-label">来場済み — ${inn.length}名</div>`;inn.forEach(g=>{h+=gRow(g)})}
  cont.innerHTML=h;
}
function gRow(g){
  const av=g.checkedIn?"av-in":(!g.paid?"av-unpaid":"av-out");
  const ini=(g.furigana||g.name).replace(/\s/g,"").substring(0,2);
  let badges="";
  if(!g.paid)badges+=`<span class="badge unpaid">入金未確認</span>`;
  if(g.hasChild)badges+=`<span class="badge child">お子様同伴</span>`;
  
  const giftClass=g.giftDelivered?"delivered":"";
  const giftSuffix=g.giftDelivered?" [済]":"";
  const gl=g.gift&&g.gift!=="ギフト不要"?`<span class="guest-gift ${giftClass}"><span class="gem"></span>${gmark(g.gift)} ${g.gift}${giftSuffix}</span>`:"";
  
  const allergyLine=g.hasAllergy?`<div class="guest-allergy-row"><span class="allergy-inline-mark">!</span>${g.allergyDetail||"アレルギーあり"}</div>`:"";
  const timeLabel=g.checkedIn&&g.checkedAt?`<span class="checkin-time">${fmtTime(g.checkedAt)} 来場</span>`:"";
  const btns=g.checkedIn
    ?`<div class="btn-col">
        <button class="check-btn done" onclick="doCheckin(event,${g.id})">✓</button>
        <button class="uncheck-btn" onclick="doUncheck(event,${g.id})">取り消し</button>
      </div>`
    :`<button class="check-btn" onclick="doCheckin(event,${g.id})"></button>`;
  return`<div class="guest-item${g.checkedIn?" checked":""}" onclick="openModal(${g.id})">
    <div class="avatar ${av}">${ini}</div>
    <div class="guest-info">
      <div class="guest-name-row"><span class="guest-name">${g.name}</span>${timeLabel}</div>
      <div class="guest-furi">${g.furigana||"　"}</div>
      ${allergyLine}
      <div class="guest-meta">${gl}${badges?`<div class="badges">${badges}</div>`:""}</div>
    </div>
    ${btns}
  </div>`;
}
window.doCheckin=function(e,id){
  e.stopPropagation();
  const g=guests.find(x=>x.id===id);if(!g||g.checkedIn)return;
  setCheckin(id,true);
  showToast(`${g.name} — ご来場を確認しました ✦`);
}
window.doUncheck=function(e,id){
  e.stopPropagation();
  const g=guests.find(x=>x.id===id);if(!g||!g.checkedIn)return;
  setCheckin(id,false);
  showToast(`${g.name} — チェックを取り消しました`);
}
window.openModal=function(id){
  selectedId=id;const g=guests.find(x=>x.id===id);
  document.getElementById("m-name").textContent=g.name;
  document.getElementById("m-furigana").textContent=g.furigana||"";
  const st=document.getElementById("m-status");
  if(g.checkedIn){st.className="modal-status checked";st.textContent=g.checkedAt?`✓ 来場済み（${fmtTime(g.checkedAt)}）`:"✓ 来場確認済み"}
  else{st.className="modal-status nc";st.textContent="◌ 未来場"}
  
  const giftArea=document.getElementById("m-gift");
  if(g.gift&&g.gift!=="ギフト不要"){
    giftArea.innerHTML=`<div class="m-gift ${g.giftDelivered?"delivered":""}"><div class="gi">${gmark(g.gift)}</div><div><div class="gl">ご希望のギフト${g.giftDelivered?" — 配布済み":""}</div><div class="gn">${g.gift}</div></div></div>`;
    const gb=document.getElementById("m-gift-btn");
    gb.style.display="block";
    gb.textContent=g.giftDelivered?"🎁 お渡し記録を取り消す":"🎁 ギフトをお渡しする";
    gb.className=g.giftDelivered?"btn-gold btn-gift undo":"btn-gold btn-gift";
    gb.onclick=()=>{
        const nv=!g.giftDelivered;
        setGiftStatus(g.id,nv);
        showToast(nv?`${g.name} — ギフトをお渡ししました`:`${g.name} — ギフト記録を消去しました`);
        closeModal();
    };
  }else{
    giftArea.innerHTML="";
    document.getElementById("m-gift-btn").style.display="none";
  }

  document.getElementById("m-allergy").innerHTML=g.hasAllergy?`<div class="m-allergy"><div class="ai">!</div><div><div class="al">食物アレルギー — 要注意</div><div class="ad">${g.allergyDetail||"詳細不明"}</div></div></div>`:"";
  let rows="";
  if(g.arrival)rows+=`<div class="modal-row"><span class="key">来場予定</span><span class="val">${g.arrival}</span></div>`;
  rows+=`<div class="modal-row"><span class="key">入金状況</span><span class="val ${g.paid?"ok":"ng"}">${g.paid?"✓ 確認済み":"⚠ 未確認"}</span></div>`;
  if(g.hasChild)rows+=`<div class="modal-row"><span class="key">お子様同伴</span><span class="val" style="color:#2a4a7a">あり</span></div>`;
  if(g.referral)rows+=`<div class="modal-row"><span class="key">ご紹介者</span><span class="val">${g.referral}</span></div>`;
  document.getElementById("m-rows").innerHTML=rows;
  
  const btn=document.getElementById("m-btn");
  btn.textContent=g.checkedIn?"来場済みを取り消す":"✦  来場確認する";
  btn.className=g.checkedIn?"btn-gold undo":"btn-gold";
  
  const ov=document.getElementById("modal-overlay");ov.style.display="flex";ov.classList.remove("hiding");
}
window.handleOverlayClick=function(e){if(e.target===document.getElementById("modal-overlay"))closeModal()}
window.closeModal=function(){const ov=document.getElementById("modal-overlay");ov.classList.add("hiding");setTimeout(()=>{ov.style.display="none";ov.classList.remove("hiding")},150);selectedId=null}
document.getElementById("m-btn").addEventListener("click",()=>{
  const g=guests.find(x=>x.id===selectedId);if(!g)return;
  const nv=!g.checkedIn;
  setCheckin(g.id,nv);
  showToast(nv?`${g.name} — ご来場を確認しました ✦`:`${g.name} — 取り消しました`);
  closeModal();
});
window.openQrPanel=function(){
  const base=window.location.href.substring(0,window.location.href.lastIndexOf("/")+1);
  document.getElementById("qr-url-text").textContent=base+"checkin.html";
  document.getElementById("qr-panel").style.display="flex";
};
window.copyUrl=function(){
  const url=document.getElementById("qr-url-text").textContent;
  navigator.clipboard.writeText(url).then(()=>showToast("URLをコピーしました")).catch(()=>prompt("URL:",url));
};
document.querySelectorAll(".filter-btn").forEach(btn=>{
  btn.addEventListener("click",()=>{filter=btn.dataset.filter;document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));btn.classList.add("active");render()});
});
document.getElementById("search").addEventListener("input",render);
function showToast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");if(toastTimer)clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove("show"),2400)}
</script>
</body>
</html>
